name: Publish changelog

on:
  repository_dispatch:
    types:
      - vercel.deployment.promoted
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-changelog
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.client_payload.environment == 'production' &&
      github.event.client_payload.git.ref == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Check out deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.git.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish changelog
        run: npm run changelog
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_CHANGELOG_DEPLOY_KEY }}
